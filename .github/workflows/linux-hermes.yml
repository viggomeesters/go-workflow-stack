name: Linux and Hermes contract

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - name: Full stack tests
        run: uv run --no-project --with pytest pytest tests/test_smoke.py -q
      - name: Stack contract
        run: make check
      - name: Deterministic Hermes build-critic-repair-resume campaign
        run: uv run --no-project --with pytest pytest tests/test_smoke.py::test_restartable_agent_campaign_builds_repairs_commits_and_completes -q
